<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市水利管网流量监测与预测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary: #0891b2;
            --primary-light: #06b6d4;
            --primary-dark: #0e7490;
            --accent: #f59e0b;
            --bg: #f0f9fa;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow-lg: 0 10px 30px rgba(0,0,0,.06);
            --radius: 14px;
            --radius-sm: 8px;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #ecfeff 0%, #f0f9fa 30%, #f8fafc 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── 顶部 ── */
        .header {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 40%, #22d3ee 100%);
            padding: 0 36px;
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(8,145,178,.25);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: repeating-linear-gradient(90deg, transparent, transparent 12px, rgba(255,255,255,.3) 12px, rgba(255,255,255,.3) 14px);
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-logo {
            width: 38px; height: 38px;
            background: rgba(255,255,255,.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(4px);
        }
        .header h1 { font-size: 20px; font-weight: 600; letter-spacing: .5px; }
        .header-right { display: flex; gap: 20px; align-items: center; font-size: 13px; }
        .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
        .header-time { opacity: .9; }

        /* ── 主容器 ── */
        .container { max-width: 1480px; margin: 0 auto; padding: 24px 28px; }

        /* ── 控制栏 ── */
        .control-bar {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            padding: 16px 20px; margin-bottom: 22px;
            background: var(--bg-card); border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .control-bar label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .control-bar input, .control-bar select {
            padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
            color: var(--text); font-size: 13px; outline: none; background: #f8fafc;
            transition: border-color .2s;
        }
        .control-bar input:focus, .control-bar select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(8,145,178,.08); }
        .btn {
            padding: 8px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer;
            font-size: 13px; font-weight: 600; transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(8,145,178,.3); }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: #d97706; box-shadow: 0 4px 12px rgba(245,158,11,.3); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #059669; box-shadow: 0 4px 12px rgba(16,185,129,.3); }

        /* ── 概览卡片 ── */
        .cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 22px; }
        .card {
            background: var(--bg-card); border-radius: var(--radius); padding: 18px 22px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            transition: transform .2s, box-shadow .2s; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
        }
        .card-0::before { background: linear-gradient(90deg, #0891b2, #06b6d4); }
        .card-1::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .card-2::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .card-3::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .card .card-icon { font-size: 24px; margin-bottom: 4px; }
        .card .card-value { font-size: 34px; font-weight: 700; color: var(--text); margin: 4px 0 2px; }
        .card .card-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .card .card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* ── 图表行 ── */
        .chart-section { margin-bottom: 22px; }
        .chart-section-title {
            font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .chart-section-title::before {
            content: ''; width: 4px; height: 18px; border-radius: 2px;
            background: var(--primary);
        }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .chart-row.single { grid-template-columns: 1fr; }
        .chart-box {
            background: var(--bg-card); border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--border); padding: 16px;
        }
        .chart-box h3 {
            font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px;
            padding-bottom: 10px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .chart-box h3 .dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        .dot-cyan { background: #06b6d4; }
        .dot-orange { background: #f59e0b; }
        .dot-purple { background: #8b5cf6; }
        .dot-green { background: #10b981; }
        .chart { width: 100%; height: 340px; }

        /* ── 实时表格 ── */
        .table-wrap { overflow-x: auto; max-height: 380px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f8fafc; font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; position: sticky; top: 0; }
        tr:hover { background: #f0fdfd; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .tag-0 { background: #d1fae5; color: #065f46; }
        .tag-1 { background: #fef3c7; color: #92400e; }
        .tag-2 { background: #fed7aa; color: #9a3412; }
        .tag-3 { background: #fecaca; color: #991b1b; }

        /* ── 页脚 ── */
        .footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 8px; }

        /* ── 响应式 ── */
        @media (max-width: 1200px) { .chart-row { grid-template-columns: 1fr; } .cards { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 8px; height: auto; padding: 12px 16px; } }

        /* ── 弹窗 ── */
        .toast { position: fixed; top: 80px; right: 28px; background: #1e293b; color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-logo">&#x1F4A7;</div>
        <h1>城市水利管网流量监测与预测系统</h1>
    </div>
    <div class="header-right">
        <div class="header-dot"></div>
        <span>系统运行中</span>
        <span style="opacity:.5">|</span>
        <span class="header-time" id="currentTime">--</span>
        <span style="opacity:.5">|</span>
        <span id="dbStatus">就绪</span>
    </div>
</div>

<div class="container">

    <!-- 控制栏 -->
    <div class="control-bar">
        <label>起始日期</label>
        <input type="date" id="startDate" value="2024-01-01">
        <label>结束日期</label>
        <input type="date" id="endDate" value="2024-12-31">
        <label>管网筛选</label>
        <select id="pipeNoSelect"><option value="">全部管网</option></select>
        <button class="btn btn-primary" onclick="refreshAll()">&#x1F50D; 查询分析</button>
        <button class="btn btn-accent" onclick="generateData()">&#x26A1; 生成模拟数据</button>
        <button class="btn btn-success" onclick="runPrediction()">&#x1F916; AI流量预测</button>
    </div>

    <!-- 概览卡片 -->
    <div class="cards">
        <div class="card card-0">
            <div class="card-icon">&#x1F4CA;</div>
            <div class="card-value" id="totalRecords">--</div>
            <div class="card-label">监测总记录数</div>
            <div class="card-sub">全量历史数据</div>
        </div>
        <div class="card card-1">
            <div class="card-icon">&#x1F6E0;&#xFE0F;</div>
            <div class="card-value" id="pipeCount">--</div>
            <div class="card-label">监测管网节点</div>
            <div class="card-sub">覆盖城区范围</div>
        </div>
        <div class="card card-2">
            <div class="card-icon">&#x26A0;&#xFE0F;</div>
            <div class="card-value" id="anomalyRate">--</div>
            <div class="card-label">异常管网占比</div>
            <div class="card-sub">实时风险监测</div>
        </div>
        <div class="card card-3">
            <div class="card-icon">&#x1F4A7;</div>
            <div class="card-value" id="avgFlow24h">--</div>
            <div class="card-label">24h 平均流量 (m³/h)</div>
            <div class="card-sub">全网均值</div>
        </div>
    </div>

    <!-- 图表第一行 -->
    <div class="chart-row">
        <div class="chart-box">
            <h3><span class="dot dot-cyan"></span>水流量趋势曲线</h3>
            <div id="chartTrend" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3><span class="dot dot-orange"></span>异常状态占比分析</h3>
            <div id="chartAnomaly" class="chart"></div>
        </div>
    </div>

    <!-- 图表第二行 -->
    <div class="chart-row">
        <div class="chart-box">
            <h3><span class="dot dot-purple"></span>24小时用水高峰分析</h3>
            <div id="chartPeakHour" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3><span class="dot dot-green"></span>多管网流量对比</h3>
            <div id="chartMultiPipe" class="chart"></div>
        </div>
    </div>

    <!-- AI预测 -->
    <div class="chart-row single">
        <div class="chart-box">
            <h3><span class="dot dot-cyan"></span>AI 流量预测（未来 24 小时）</h3>
            <div id="chartPredict" class="chart"></div>
        </div>
    </div>

    <!-- 实时监测表格 -->
    <div class="chart-row single">
        <div class="chart-box">
            <h3><span class="dot dot-green"></span>实时监测数据面板</h3>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>管网编号</th><th>管网名称</th><th>监测日期</th><th>小时</th>
                        <th>水流量(m³/h)</th><th>水压(MPa)</th><th>异常等级</th><th>水质状态</th>
                    </tr></thead>
                    <tbody id="realtimeTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="footer">城市水利管网流量监测与预测系统 &copy; 2024 &mdash; SpringBoot + MyBatis + ECharts</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 全局变量 ====================
const API = '';

// Toast
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== 初始化 ====================
window.onload = function() {
    updateClock();
    setInterval(updateClock, 1000);
    initCharts();
    loadOverview();
    refreshAll();
};

function updateClock() {
    document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
}

// ==================== 图表初始化 ====================
let charts = {};
function initCharts() {
    charts.trend = echarts.init(document.getElementById('chartTrend'));
    charts.anomaly = echarts.init(document.getElementById('chartAnomaly'));
    charts.peakHour = echarts.init(document.getElementById('chartPeakHour'));
    charts.multiPipe = echarts.init(document.getElementById('chartMultiPipe'));
    charts.predict = echarts.init(document.getElementById('chartPredict'));
    window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
}

// ==================== 工具函数 ====================
function getDates() {
    return {
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        pipeNo: document.getElementById('pipeNoSelect').value
    };
}

async function fetchAPI(url) {
    try {
        const resp = await fetch(API + url);
        return await resp.json();
    } catch (e) {
        console.error('API error:', url, e);
        return null;
    }
}

// ==================== 数据生成 ====================
async function generateData() {
    if (!confirm('确认生成千万级模拟数据？\n\n将生成约 1314 万条记录，耗时约 15~30 分钟。\n请确保磁盘空间充足（约 5 GB）。')) return;

    document.getElementById('dbStatus').textContent = '生成中,请稍候...';
    document.getElementById('dbStatus').style.color = '#f59e0b';
    showToast('数据生成中，请耐心等待...');

    const result = await fetchAPI('/api/generate?startDate=2024-01-01&pipeCount=500');
    if (result && !result.error) {
        showToast('生成成功！记录数：' + (result['实际插入数'] || result['actualInserted'] || 'OK'));
    } else {
        alert('数据生成失败: ' + (result ? (result['错误'] || JSON.stringify(result)) : '网络错误'));
    }
    document.getElementById('dbStatus').textContent = '就绪';
    document.getElementById('dbStatus').style.color = '#fff';
    loadOverview();
    refreshAll();
}

// ==================== 数据概览 ====================
async function loadOverview() {
    const data = await fetchAPI('/api/overview');
    if (!data) return;

    document.getElementById('totalRecords').textContent = (data.totalRecords || 0).toLocaleString();
    document.getElementById('pipeCount').textContent = (data.pipeCount || 0).toLocaleString();

    const select = document.getElementById('pipeNoSelect');
    select.innerHTML = '<option value="">全部管网</option>';
    if (data.pipeNos) {
        data.pipeNos.forEach(pn => {
            select.innerHTML += '<option value="' + pn + '">' + pn + '</option>';
        });
    }

    const realtime = await fetchAPI('/api/realtime');
    if (realtime && realtime.latestRecords) {
        const tbody = document.getElementById('realtimeTable');
        const levelNames = ['正常', '轻微', '中度', '严重'];
        const levelClasses = ['tag-0', 'tag-1', 'tag-2', 'tag-3'];
        tbody.innerHTML = realtime.latestRecords.slice(0, 15).map(r => `
            <tr>
                <td><strong>${r.pipeNo || ''}</strong></td>
                <td>${r.pipeName || ''}</td>
                <td>${r.monitorDate || ''}</td>
                <td>${r.monitorHour != null ? r.monitorHour + ':00' : ''}</td>
                <td>${r.flowRate || ''}</td>
                <td>${r.waterPressure || ''}</td>
                <td><span class="tag ${levelClasses[r.anomalyLevel] || 'tag-0'}">${levelNames[r.anomalyLevel] || '正常'}</span></td>
                <td>${r.waterQuality || ''}</td>
            </tr>`).join('');
    }
}

// ==================== 刷新所有图表 ====================
async function refreshAll() {
    const { startDate, endDate, pipeNo } = getDates();

    const [trend, anomaly, peakHour, multiPipe] = await Promise.all([
        fetchAPI('/api/flow/trend?startDate=' + startDate + '&endDate=' + endDate + (pipeNo ? '&pipeNo=' + pipeNo : '')),
        fetchAPI('/api/flow/anomaly?startDate=' + startDate + '&endDate=' + endDate),
        fetchAPI('/api/flow/peak-hour?startDate=' + startDate + '&endDate=' + endDate),
        fetchAPI('/api/flow/multi-compare?startDate=' + startDate + '&endDate=' + endDate + '&topN=12')
    ]);

    renderTrend(trend);
    renderAnomaly(anomaly);
    renderPeakHour(peakHour);
    renderMultiPipe(multiPipe);

    if (anomaly && anomaly.values && anomaly.labels) {
        let totalAnomaly = 0;
        for (let i = 1; i < anomaly.values.length; i++) totalAnomaly += Number(anomaly.values[i]) || 0;
        document.getElementById('anomalyRate').textContent = totalAnomaly.toFixed(2) + '%';
    }
}

// ==================== 流量趋势曲线图 ====================
function renderTrend(data) {
    if (!data || !data.dates) { charts.trend.showLoading(); return; }
    charts.trend.hideLoading();
    charts.trend.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['日总流量', '日平均流量'], top: 0, textStyle: { color: '#64748b' } },
        grid: { left: '3%', right: '5%', top: 50, bottom: 18, containLabel: true },
        xAxis: { type: 'category', data: data.dates, axisLabel: { color: '#94a3b8', rotate: 45, fontSize: 10, formatter: v => v.slice(5) }, axisLine: { lineStyle: { color: '#e2e8f0' } } },
        yAxis: { type: 'value', name: '流量(m³)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } } },
        series: [
            { name: '日总流量', type: 'line', data: data.totalFlows, smooth: true, symbol: 'none', lineStyle: { color: '#0891b2', width: 2.5 }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0, color:'rgba(8,145,178,.25)'}, {offset:1, color:'rgba(8,145,178,.02)'}]) } },
            { name: '日平均流量', type: 'line', data: data.avgFlows, smooth: true, symbol: 'none', lineStyle: { color: '#f59e0b', width: 2, type: 'dashed' } }
        ]
    });
}

// ==================== 异常状态饼图 ====================
function renderAnomaly(data) {
    if (!data || !data.labels) { charts.anomaly.showLoading(); return; }
    charts.anomaly.hideLoading();
    const colors = ['#10b981', '#f59e0b', '#f97316', '#ef4444'];
    charts.anomaly.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c}%' },
        legend: { orient: 'vertical', right: 8, top: 'center', textStyle: { color: '#64748b', fontSize: 12 } },
        series: [{ type: 'pie', radius: ['48%', '75%'], center: ['38%', '50%'], itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 3 }, label: { color: '#64748b', formatter: '{b}\n{d}%', fontSize: 11 }, data: data.labels.map((l, i) => ({ name: l, value: Number(data.values[i]) || 0, itemStyle: { color: colors[i] } })) }]
    });
}

// ==================== 高峰时段柱状图 ====================
function renderPeakHour(data) {
    if (!data || !data.hours) { charts.peakHour.showLoading(); return; }
    charts.peakHour.hideLoading();
    charts.peakHour.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['平均流量', '最大流量'], top: 0, textStyle: { color: '#64748b' } },
        grid: { left: '3%', right: '5%', top: 50, bottom: 10, containLabel: true },
        xAxis: { type: 'category', data: data.hours.map(h => h + ':00'), axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#e2e8f0' } } },
        yAxis: { type: 'value', name: '流量(m³/h)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } } },
        series: [
            { name: '平均流量', type: 'bar', data: data.avgFlows, barWidth: '55%', itemStyle: { borderRadius: [4,4,0,0], color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0, color:'#8b5cf6'}, {offset:1, color:'#c4b5fd'}]) } },
            { name: '最大流量', type: 'bar', data: data.maxFlows, barWidth: '55%', itemStyle: { borderRadius: [4,4,0,0], color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0, color:'#f59e0b'}, {offset:1, color:'#fde68a'}]) } }
        ]
    });
    if (data.avgFlows && data.avgFlows.length > 0) {
        const sum = data.avgFlows.reduce((a, b) => a + Number(b), 0);
        document.getElementById('avgFlow24h').textContent = (sum / data.avgFlows.length).toFixed(2);
    }
}

// ==================== 多管网对比 ====================
function renderMultiPipe(data) {
    if (!data || !data.names) { charts.multiPipe.showLoading(); return; }
    charts.multiPipe.hideLoading();
    charts.multiPipe.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['总流量', '平均流量'], top: 0, textStyle: { color: '#64748b' } },
        grid: { left: '3%', right: '5%', top: 50, bottom: 40, containLabel: true },
        xAxis: { type: 'category', data: data.names, axisLabel: { color: '#94a3b8', rotate: 30, fontSize: 10 }, axisLine: { lineStyle: { color: '#e2e8f0' } } },
        yAxis: [
            { type: 'value', name: '总流量(m³)', nameTextStyle: { color: '#0891b2' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } } },
            { type: 'value', name: '平均(m³/h)', nameTextStyle: { color: '#f59e0b' }, axisLabel: { color: '#94a3b8' } }
        ],
        series: [
            { name: '总流量', type: 'bar', data: data.totalFlows, barWidth: '50%', itemStyle: { borderRadius: [4,4,0,0], color: '#0891b2' } },
            { name: '平均流量', type: 'bar', data: data.avgFlows, yAxisIndex: 1, barWidth: '50%', itemStyle: { borderRadius: [4,4,0,0], color: '#f59e0b' } }
        ]
    });
}

// ==================== AI预测 ====================
async function runPrediction() {
    const pipeNo = document.getElementById('pipeNoSelect').value;
    if (!pipeNo) { alert('请先选择一个管网编号进行预测！'); return; }

    charts.predict.showLoading({ text: 'AI 训练中...', maskColor: 'rgba(255,255,255,.8)', textColor: '#0891b2' });
    const data = await fetchAPI('/api/predict?pipeNo=' + pipeNo);
    charts.predict.hideLoading();

    if (!data || data.error) {
        charts.predict.setOption({ title: { text: data ? data.error : '预测失败', left: 'center', top: 'center', textStyle: { color: '#ef4444', fontSize: 16 } } });
        return;
    }

    const hours = data.forecast.map(f => f.hour + ':00');
    const predicted = data.forecast.map(f => f.predictedFlow);
    const historical = data.forecast.map(f => f.historicalAvg);

    charts.predict.setOption({
        title: { text: '管网 ' + pipeNo + ' ─ 未来24h预测  R²=' + (data.modelScore || 0), textStyle: { color: '#1e293b', fontSize: 14, fontWeight: 600 }, left: 'center', top: 4 },
        tooltip: { trigger: 'axis' },
        legend: { data: ['预测流量', '历史均值'], top: 28, textStyle: { color: '#64748b' } },
        grid: { left: '3%', right: '5%', top: 72, bottom: 10, containLabel: true },
        xAxis: { type: 'category', data: hours, axisLabel: { color: '#94a3b8' }, axisLine: { lineStyle: { color: '#e2e8f0' } } },
        yAxis: { type: 'value', name: '流量(m³/h)', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' }, splitLine: { lineStyle: { color: '#f1f5f9', type: 'dashed' } } },
        series: [
            { name: '预测流量', type: 'line', data: predicted, smooth: true, symbol: 'circle', symbolSize: 6, lineStyle: { color: '#0891b2', width: 2.5 }, itemStyle: { color: '#0891b2' }, areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0, color:'rgba(8,145,178,.3)'}, {offset:1, color:'rgba(8,145,178,.01)'}]) }, markLine: { silent: true, data: [{ type: 'average', name: '均值' }], lineStyle: { color: '#10b981', type: 'dashed' }, label: { color: '#10b981', fontSize: 11 } } },
            { name: '历史均值', type: 'line', data: historical, smooth: true, symbol: 'diamond', symbolSize: 5, lineStyle: { color: '#f59e0b', width: 2, type: 'dashed' }, itemStyle: { color: '#f59e0b' } }
        ]
    });
    if (data.totalPredicted24h) document.getElementById('avgFlow24h').textContent = (data.totalPredicted24h / 24).toFixed(2);
}
</script>
