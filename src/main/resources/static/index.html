<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市水利管网流量监测与预测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #0a1628; color: #e0e6ed; min-height: 100vh; }

        /* 顶部导航 */
        .header { background: linear-gradient(135deg, #0d2137 0%, #0f3460 100%); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1a4a7a;
            box-shadow: 0 2px 20px rgba(0,150,255,0.1); }
        .header h1 { font-size: 22px; color: #4fc3f7; letter-spacing: 2px; }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .header-right span { font-size: 13px; color: #7eb8da; }

        /* 主布局 */
        .container { padding: 20px; max-width: 1600px; margin: 0 auto; }

        /* 控制栏 */
        .control-bar { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 20px;
            padding: 15px 20px; background: rgba(15,52,96,0.3); border-radius: 10px; border: 1px solid #1a4a7a; }
        .control-bar label { font-size: 13px; color: #7eb8da; }
        .control-bar input, .control-bar select, .control-bar button {
            padding: 8px 14px; border-radius: 6px; border: 1px solid #1a4a7a; background: #0a1628;
            color: #e0e6ed; font-size: 13px; outline: none; }
        .control-bar input:focus, .control-bar select:focus { border-color: #4fc3f7; }
        .control-bar button { background: linear-gradient(135deg, #1565c0, #1976d2); border: none;
            cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .control-bar button:hover { background: linear-gradient(135deg, #1976d2, #2196f3);
            box-shadow: 0 0 15px rgba(33,150,243,0.4); }
        .btn-warn { background: linear-gradient(135deg, #e65100, #f57c00) !important; }
        .btn-warn:hover { box-shadow: 0 0 15px rgba(245,124,0,0.4) !important; }
        .btn-success { background: linear-gradient(135deg, #2e7d32, #388e3c) !important; }

        /* 概览卡片 */
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: linear-gradient(135deg, rgba(15,52,96,0.4), rgba(13,33,55,0.6));
            border: 1px solid #1a4a7a; border-radius: 10px; padding: 20px; text-align: center;
            transition: transform 0.3s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,150,255,0.15); }
        .card .value { font-size: 32px; font-weight: bold; color: #4fc3f7; margin: 8px 0; }
        .card .label { font-size: 13px; color: #7eb8da; }
        .card .icon { font-size: 28px; margin-bottom: 5px; }

        /* 图表网格 */
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-row .full { grid-column: 1 / -1; }
        .chart-box { background: rgba(15,52,96,0.2); border: 1px solid #1a4a7a; border-radius: 10px;
            padding: 15px; }
        .chart-box h3 { font-size: 15px; color: #4fc3f7; margin-bottom: 10px; padding-bottom: 10px;
            border-bottom: 1px solid #1a4a7a; }
        .chart { width: 100%; height: 360px; }

        /* 表格 */
        .table-box { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1a4a7a; }
        th { background: rgba(15,52,96,0.5); color: #4fc3f7; font-weight: bold; position: sticky; top: 0; }
        tr:hover { background: rgba(79,195,247,0.05); }

        /* 异常等级标签 */
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .tag-0 { background: #1b5e20; color: #81c784; }
        .tag-1 { background: #e65100; color: #ffb74d; }
        .tag-2 { background: #bf360c; color: #ff8a65; }
        .tag-3 { background: #b71c1c; color: #ef9a9a; }

        /* 响应式 */
        @media (max-width: 1200px) { .chart-row { grid-template-columns: 1fr; } .cards { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .cards { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 10px; } }

        .loading-text { text-align: center; padding: 40px; color: #7eb8da; }
        .footer { text-align: center; padding: 15px; color: #4a6a8a; font-size: 12px; border-top: 1px solid #1a4a7a;
            margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🌊 城市水利管网流量监测与预测系统</h1>
    <div class="header-right">
        <span id="currentTime">--</span>
        <span>|</span>
        <span id="dbStatus">数据库状态: 检测中...</span>
    </div>
</div>

<div class="container">
    <!-- 控制栏 -->
    <div class="control-bar">
        <label>起始日期:</label>
        <input type="date" id="startDate" value="2024-01-01">
        <label>结束日期:</label>
        <input type="date" id="endDate" value="2024-12-31">
        <label>管网编号:</label>
        <select id="pipeNoSelect"><option value="">全部管网</option></select>
        <button onclick="refreshAll()">🔍 查询分析</button>
        <button class="btn-warn" onclick="generateData()">⚡ 生成模拟数据</button>
        <button class="btn-success" onclick="runPrediction()">🤖 AI流量预测</button>
    </div>

    <!-- 概览卡片 -->
    <div class="cards">
        <div class="card">
            <div class="icon">📊</div>
            <div class="value" id="totalRecords">--</div>
            <div class="label">监测总记录数</div>
        </div>
        <div class="card">
            <div class="icon">🔧</div>
            <div class="value" id="pipeCount">--</div>
            <div class="label">监测管网数量</div>
        </div>
        <div class="card">
            <div class="icon">⚠️</div>
            <div class="value" id="anomalyRate">--</div>
            <div class="label">异常管网比例</div>
        </div>
        <div class="card">
            <div class="icon">💧</div>
            <div class="value" id="avgFlow24h">--</div>
            <div class="label">24h平均流量(m³/h)</div>
        </div>
    </div>

    <!-- 图表第一行: 流量趋势 + 异常饼图 -->
    <div class="chart-row">
        <div class="chart-box">
            <h3>📈 水流量趋势曲线</h3>
            <div id="chartTrend" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3>🥧 异常状态占比分析</h3>
            <div id="chartAnomaly" class="chart"></div>
        </div>
    </div>

    <!-- 图表第二行: 高峰时段 + 多管网对比 -->
    <div class="chart-row">
        <div class="chart-box">
            <h3>⏰ 24小时用水高峰分析</h3>
            <div id="chartPeakHour" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3>📊 多管网流量对比</h3>
            <div id="chartMultiPipe" class="chart"></div>
        </div>
    </div>

    <!-- 图表第三行: AI预测 -->
    <div class="chart-row">
        <div class="chart-box full">
            <h3>🤖 AI流量预测（未来24小时）</h3>
            <div id="chartPredict" class="chart"></div>
        </div>
    </div>

    <!-- 实时监测表格 -->
    <div class="chart-row">
        <div class="chart-box full">
            <h3>📋 实时监测数据面板</h3>
            <div class="table-box">
                <table>
                    <thead>
                        <tr>
                            <th>管网编号</th><th>管网名称</th><th>监测日期</th><th>监测小时</th>
                            <th>水流量(m³/h)</th><th>水压(MPa)</th><th>异常等级</th><th>水质状态</th>
                        </tr>
                    </thead>
                    <tbody id="realtimeTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="footer">城市水利管网流量监测与预测系统 © 2024 | SpringBoot + MyBatis + ECharts</div>

<script>
// ==================== 全局变量 ====================
const API = '';

// ==================== 初始化 ====================
window.onload = function() {
    updateClock();
    setInterval(updateClock, 1000);
    initCharts();
    loadOverview();
    refreshAll();
};

function updateClock() {
    document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
}

// ==================== 图表初始化 ====================
let charts = {};
function initCharts() {
    charts.trend = echarts.init(document.getElementById('chartTrend'));
    charts.anomaly = echarts.init(document.getElementById('chartAnomaly'));
    charts.peakHour = echarts.init(document.getElementById('chartPeakHour'));
    charts.multiPipe = echarts.init(document.getElementById('chartMultiPipe'));
    charts.predict = echarts.init(document.getElementById('chartPredict'));
    window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
}

// ==================== 工具函数 ====================
function getDates() {
    return {
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        pipeNo: document.getElementById('pipeNoSelect').value
    };
}

async function fetchAPI(url) {
    try {
        const resp = await fetch(API + url);
        return await resp.json();
    } catch (e) {
        console.error('API请求失败:', url, e);
        return null;
    }
}

// ==================== 数据生成 ====================
async function generateData() {
    if (!confirm('确认生成千万级模拟数据？\n\n将生成约1314万条记录，耗时约15-30分钟。\n请确保磁盘空间充足(约5GB)。')) return;

    document.getElementById('dbStatus').textContent = '数据库状态: 正在生成数据,请稍候...';
    document.getElementById('dbStatus').style.color = '#f57c00';

    const result = await fetchAPI('/api/generate?startDate=2024-01-01&pipeCount=500');
    if (result && !result.error) {
        alert('数据生成成功！\n\n实际插入: ' + (result['实际插入数'] || result['actualInserted'] || '')
            + ' 条\n耗时: ' + (result['耗时(秒)'] || result['elapsed'] || '') + ' 秒');
    } else {
        alert('数据生成失败: ' + (result ? (result.error || JSON.stringify(result)) : '网络错误'));
    }
    document.getElementById('dbStatus').textContent = '数据库状态: 就绪';
    document.getElementById('dbStatus').style.color = '#81c784';
    loadOverview();
    refreshAll();
}

// ==================== 数据概览 ====================
async function loadOverview() {
    const data = await fetchAPI('/api/overview');
    if (!data) return;

    document.getElementById('totalRecords').textContent = (data.totalRecords || 0).toLocaleString();
    document.getElementById('pipeCount').textContent = (data.pipeCount || 0).toLocaleString();
    document.getElementById('dbStatus').textContent = '数据库状态: 就绪';
    document.getElementById('dbStatus').style.color = '#81c784';

    // 加载管网下拉列表
    const select = document.getElementById('pipeNoSelect');
    select.innerHTML = '<option value="">全部管网</option>';
    if (data.pipeNos) {
        data.pipeNos.forEach(pn => {
            select.innerHTML += '<option value="' + pn + '">' + pn + '</option>';
        });
    }

    // 加载实时数据
    const realtime = await fetchAPI('/api/realtime');
    if (realtime && realtime.latestRecords) {
        const tbody = document.getElementById('realtimeTable');
        const levelNames = ['正常', '轻微', '中度', '严重'];
        const levelClasses = ['tag-0', 'tag-1', 'tag-2', 'tag-3'];
        tbody.innerHTML = realtime.latestRecords.slice(0, 15).map(r => `
            <tr>
                <td>${r.pipeNo || ''}</td>
                <td>${r.pipeName || ''}</td>
                <td>${r.monitorDate || ''}</td>
                <td>${r.monitorHour != null ? r.monitorHour + ':00' : ''}</td>
                <td>${r.flowRate || ''}</td>
                <td>${r.waterPressure || ''}</td>
                <td><span class="tag ${levelClasses[r.anomalyLevel] || 'tag-0'}">${levelNames[r.anomalyLevel] || '正常'}</span></td>
                <td>${r.waterQuality || ''}</td>
            </tr>`).join('');
    }
}

// ==================== 刷新所有图表 ====================
async function refreshAll() {
    const { startDate, endDate, pipeNo } = getDates();

    // 并行加载所有数据
    const [trend, anomaly, peakHour, multiPipe] = await Promise.all([
        fetchAPI('/api/flow/trend?startDate=' + startDate + '&endDate=' + endDate + (pipeNo ? '&pipeNo=' + pipeNo : '')),
        fetchAPI('/api/flow/anomaly?startDate=' + startDate + '&endDate=' + endDate),
        fetchAPI('/api/flow/peak-hour?startDate=' + startDate + '&endDate=' + endDate),
        fetchAPI('/api/flow/multi-compare?startDate=' + startDate + '&endDate=' + endDate + '&topN=12')
    ]);

    renderTrend(trend);
    renderAnomaly(anomaly);
    renderPeakHour(peakHour);
    renderMultiPipe(multiPipe);

    // 更新异常率
    if (anomaly && anomaly.values && anomaly.labels) {
        let totalAnomaly = 0;
        for (let i = 1; i < anomaly.values.length; i++) {
            totalAnomaly += Number(anomaly.values[i]) || 0;
        }
        document.getElementById('anomalyRate').textContent = totalAnomaly.toFixed(2) + '%';
    }
}

// ==================== 流量趋势曲线图 ====================
function renderTrend(data) {
    if (!data || !data.dates) { charts.trend.showLoading(); return; }
    charts.trend.hideLoading();
    charts.trend.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['日总流量', '日平均流量'], textStyle: { color: '#7eb8da' } },
        xAxis: {
            type: 'category', data: data.dates,
            axisLabel: { color: '#7eb8da', rotate: 45, fontSize: 10 },
            axisLine: { lineStyle: { color: '#1a4a7a' } }
        },
        yAxis: {
            type: 'value', name: '流量(m³)',
            nameTextStyle: { color: '#7eb8da' },
            axisLabel: { color: '#7eb8da' },
            splitLine: { lineStyle: { color: '#1a4a7a', type: 'dashed' } }
        },
        grid: { left: 60, right: 30, top: 40, bottom: 60 },
        series: [
            {
                name: '日总流量', type: 'line', data: data.totalFlows,
                smooth: true, symbol: 'none',
                lineStyle: { color: '#4fc3f7', width: 2 },
                areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,
                    [{offset:0, color:'rgba(79,195,247,0.3)'}, {offset:1, color:'rgba(79,195,247,0.02)'}]) }
            },
            {
                name: '日平均流量', type: 'line', data: data.avgFlows,
                smooth: true, symbol: 'none',
                lineStyle: { color: '#ffb74d', width: 2, type: 'dashed' } }
        ]
    });
}

// ==================== 异常状态饼图 ====================
function renderAnomaly(data) {
    if (!data || !data.labels) { charts.anomaly.showLoading(); return; }
    charts.anomaly.hideLoading();
    const colors = ['#81c784', '#ffb74d', '#ff8a65', '#ef9a9a'];
    charts.anomaly.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c}%' },
        legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#7eb8da' } },
        series: [{
            type: 'pie', radius: ['45%', '70%'], center: ['40%', '50%'],
            itemStyle: { borderRadius: 6, borderColor: '#0a1628', borderWidth: 3 },
            label: { color: '#7eb8da', formatter: '{b}\n{d}%' },
            data: data.labels.map((l, i) => ({ name: l, value: Number(data.values[i]) || 0,
                itemStyle: { color: colors[i] } }))
        }]
    });
}

// ==================== 高峰时段柱状图 ====================
function renderPeakHour(data) {
    if (!data || !data.hours) { charts.peakHour.showLoading(); return; }
    charts.peakHour.hideLoading();
    charts.peakHour.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['平均流量', '最大流量'], textStyle: { color: '#7eb8da' } },
        xAxis: {
            type: 'category', data: data.hours.map(h => h + ':00'),
            axisLabel: { color: '#7eb8da' },
            axisLine: { lineStyle: { color: '#1a4a7a' } }
        },
        yAxis: {
            type: 'value', name: '流量(m³/h)',
            nameTextStyle: { color: '#7eb8da' },
            axisLabel: { color: '#7eb8da' },
            splitLine: { lineStyle: { color: '#1a4a7a', type: 'dashed' } }
        },
        grid: { left: 60, right: 30, top: 40, bottom: 40 },
        series: [
            {
                name: '平均流量', type: 'bar', data: data.avgFlows,
                itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,
                    [{offset:0, color:'#4fc3f7'}, {offset:1, color:'#1565c0'}]) },
                barWidth: '60%'
            },
            {
                name: '最大流量', type: 'bar', data: data.maxFlows,
                itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,
                    [{offset:0, color:'#ffb74d'}, {offset:1, color:'#e65100'}]) },
                barWidth: '60%'
            }
        ]
    });

    // 更新24h平均流量
    if (data.avgFlows && data.avgFlows.length > 0) {
        const sum = data.avgFlows.reduce((a, b) => a + Number(b), 0);
        document.getElementById('avgFlow24h').textContent = (sum / data.avgFlows.length).toFixed(2);
    }
}

// ==================== 多管网对比柱状图 ====================
function renderMultiPipe(data) {
    if (!data || !data.names) { charts.multiPipe.showLoading(); return; }
    charts.multiPipe.hideLoading();
    charts.multiPipe.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['总流量', '平均流量'], textStyle: { color: '#7eb8da' } },
        xAxis: {
            type: 'category', data: data.names,
            axisLabel: { color: '#7eb8da', rotate: 30, fontSize: 10 },
            axisLine: { lineStyle: { color: '#1a4a7a' } }
        },
        yAxis: [
            { type: 'value', name: '总流量(m³)', nameTextStyle: { color: '#4fc3f7' },
                axisLabel: { color: '#7eb8da' }, splitLine: { lineStyle: { color: '#1a4a7a', type: 'dashed' } } },
            { type: 'value', name: '平均流量(m³/h)', nameTextStyle: { color: '#ffb74d' },
                axisLabel: { color: '#7eb8da' } }
        ],
        grid: { left: 60, right: 60, top: 40, bottom: 70 },
        series: [
            { name: '总流量', type: 'bar', data: data.totalFlows,
                itemStyle: { color: '#4fc3f7' }, barWidth: '50%' },
            { name: '平均流量', type: 'bar', data: data.avgFlows, yAxisIndex: 1,
                itemStyle: { color: '#ffb74d' }, barWidth: '50%' }
        ]
    });
}

// ==================== AI预测 ====================
async function runPrediction() {
    const pipeNo = document.getElementById('pipeNoSelect').value;
    if (!pipeNo) { alert('请先选择一个管网编号进行预测！'); return; }

    charts.predict.showLoading({ text: 'AI模型训练中,请稍候...' });
    const data = await fetchAPI('/api/predict?pipeNo=' + pipeNo);
    charts.predict.hideLoading();

    if (!data || data.error) {
        charts.predict.setOption({
            title: { text: data ? data.error : '预测失败', left: 'center', top: 'center',
                textStyle: { color: '#ef9a9a', fontSize: 16 } }
        });
        return;
    }

    const hours = data.forecast.map(f => f.hour + ':00');
    const predicted = data.forecast.map(f => f.predictedFlow);
    const historical = data.forecast.map(f => f.historicalAvg);

    charts.predict.setOption({
        title: {
            text: '管网 ' + pipeNo + ' 未来24小时流量预测 (模型R²=' + (data.modelScore || 0) + ')',
            textStyle: { color: '#ffb74d', fontSize: 14 },
            left: 'center'
        },
        tooltip: { trigger: 'axis' },
        legend: { data: ['预测流量', '历史均值'], top: 30, textStyle: { color: '#7eb8da' } },
        xAxis: {
            type: 'category', data: hours,
            axisLabel: { color: '#7eb8da' },
            axisLine: { lineStyle: { color: '#1a4a7a' } }
        },
        yAxis: {
            type: 'value', name: '流量(m³/h)',
            nameTextStyle: { color: '#7eb8da' },
            axisLabel: { color: '#7eb8da' },
            splitLine: { lineStyle: { color: '#1a4a7a', type: 'dashed' } }
        },
        grid: { left: 60, right: 60, top: 80, bottom: 40 },
        series: [
            {
                name: '预测流量', type: 'line', data: predicted,
                smooth: true, symbol: 'circle', symbolSize: 6,
                lineStyle: { color: '#4fc3f7', width: 2.5 },
                itemStyle: { color: '#4fc3f7' },
                areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,
                    [{offset:0, color:'rgba(79,195,247,0.4)'}, {offset:1, color:'rgba(79,195,247,0.02)'}]) },
                markLine: {
                    silent: true,
                    data: [{ type: 'average', name: '预测均值' }],
                    lineStyle: { color: '#81c784', type: 'dashed' }
                }
            },
            {
                name: '历史均值', type: 'line', data: historical,
                smooth: true, symbol: 'diamond', symbolSize: 5,
                lineStyle: { color: '#ffb74d', width: 2, type: 'dashed' },
                itemStyle: { color: '#ffb74d' }
            }
        ]
    });

    document.getElementById('avgFlow24h').textContent =
        data.totalPredicted24h ? (data.totalPredicted24h / 24).toFixed(2) : '--';
}
</script>
</body>
</html>
